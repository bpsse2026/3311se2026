<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginPage" class="container">
        <div class="login-box">
            <h1>Member Login</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
                <p id="loginError" class="error-message"></p>
            </form>
        </div>
    </div>

    <div id="homePage" class="container hidden">
        <div class="navbar">
            <h1>Welcome, <span id="userDisplay"></span>!</h1>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        
        <div class="content">
            <h2>Member Dashboard</h2>
            <div class="button-grid">
                <a href="https://example.com/page1" class="nav-button" target="_blank">
                    <div class="button-icon">📄</div>
                    <div class="button-text">Page 1</div>
                </a>
                <a href="https://example.com/page2" class="nav-button" target="_blank">
                    <div class="button-icon">📊</div>
                    <div class="button-text">Page 2</div>
                </a>
                <a href="https://example.com/page3" class="nav-button" target="_blank">
                    <div class="button-icon">⚙️</div>
                    <div class="button-text">Page 3</div>
                </a>
                <a href="https://example.com/page4" class="nav-button" target="_blank">
                    <div class="button-icon">👤</div>
                    <div class="button-text">Page 4</div>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
