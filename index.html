<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="bubbles">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
    </div>

    <div id="loginPage" class="page-wrapper">
        <div class="card">
            <div class="card-header">
                <img src="logo.jpg" alt="Sensus Ekonomi 2026" class="card-logo">
                <h1 class="card-title">Portal Website SE2026<br><span class="card-subtitle">BPS Kabupaten Sukoharjo</span></h1>
            </div>
            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <span class="input-icon">&#9993;</span>
                    <input type="text" id="username" name="username" placeholder="Username / Email" required autocomplete="username">
                </div>
                <div class="input-group">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn" aria-label="Show password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <p class="forgot">Forgot Password?</p>
                <button type="submit" class="dynamic-btn btn-login">Login</button>
                <p id="loginError" class="error-message"></p>
            </form>
        </div>
    </div>

    <div id="homePage" class="page-wrapper hidden">
        <div class="navbar">
            <h1>Welcome, <span id="userDisplay"></span>!</h1>
            <button class="dynamic-btn btn-logout" onclick="logout()">Logout</button>
        </div>
        <div class="content">
            <h2 class="dashboard-title">Member Dashboard</h2>
            <div class="button-grid">
                <a href="https://gojags-classroom.bps.go.id/" class="nav-button dynamic-btn" target="_blank">
                    <div class="button-icon">📄</div>
                    <div class="button-text">Web Gojaqs</div>
                </a>
                <a href="https://example.com/page2" class="nav-button dynamic-btn" target="_blank">
                    <div class="button-icon">📊</div>
                    <div class="button-text">Page 2</div>
                </a>
                <a href="https://example.com/page3" class="nav-button dynamic-btn" target="_blank">
                    <div class="button-icon">⚙️</div>
                    <div class="button-text">Page 3</div>
                </a>
                <a href="https://example.com/page4" class="nav-button dynamic-btn" target="_blank">
                    <div class="button-icon">👤</div>
                    <div class="button-text">Page 4</div>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
