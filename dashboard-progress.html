<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Progress Lapangan — SE2026</title>
    <script>
        (function() {
            if (!sessionStorage.getItem('currentUser')) {
                window.location.replace('index.html');
            }
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6a00 0%, #fff0e0 50%, #ff8c00 100%);
            background-size: 300% 300%;
            animation: bgShift 8s ease infinite;
            min-height: 100vh;
        }
        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bubbles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bubble {
            position: absolute; bottom: -200px; border-radius: 50%;
            background: rgba(255,200,50,0.18);
            animation: floatUp linear infinite;
        }
        .bubble:nth-child(1) { width:120px; height:120px; left:8%;  animation-duration:9s;  animation-delay:0s; }
        .bubble:nth-child(2) { width:70px;  height:70px;  left:22%; animation-duration:7s;  animation-delay:1.5s; }
        .bubble:nth-child(3) { width:180px; height:180px; left:45%; animation-duration:11s; animation-delay:3s; }
        .bubble:nth-child(4) { width:90px;  height:90px;  left:63%; animation-duration:8s;  animation-delay:0.8s; }
        .bubble:nth-child(5) { width:55px;  height:55px;  left:78%; animation-duration:6s;  animation-delay:2s; }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);        opacity: 0.6; }
            50%  { transform: translateY(-50vh) scale(1.05); opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1);   opacity: 0; }
        }

        .page-wrapper {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 20px 40px;
        }

        /* NAVBAR */
        .navbar {
            width: 100%; max-width: 900px;
            background: linear-gradient(135deg, #ff8c00 0%, #ff5500 100%);
            padding: 14px 24px;
            display: flex; align-items: center; gap: 14px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(255,80,0,0.3);
            margin-bottom: 24px;
        }
        .navbar-logo {
            width: 44px; height: 44px;
            object-fit: cover; border-radius: 10px; flex-shrink: 0;
        }
        .navbar-text h1 { font-size: 16px; font-weight: 900; color: white; }
        .navbar-text p  { font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 600; }
        .btn-back {
            margin-left: auto;
            padding: 9px 20px;
            background: rgba(255,255,255,0.25); color: white;
            font-size: 13px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 50px; cursor: pointer; text-decoration: none;
            transition: background 0.2s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
            flex-shrink: 0;
        }
        .btn-back:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }

        /* MAIN CONTENT */
        .content { width: 100%; max-width: 900px; }

        /* POWER BI EMBED CARD */
        .powerbi-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .powerbi-card-header {
            background: linear-gradient(135deg, #0077b6, #00c9a7);
            padding: 14px 22px;
            display: flex; align-items: center; gap: 10px;
        }
        .powerbi-card-header span { font-size: 18px; }
        .powerbi-card-header h2 {
            font-size: 14px; font-weight: 900; color: white;
        }
        .powerbi-card-header p {
            font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600;
        }
        .powerbi-iframe-wrap {
            width: 100%;
            aspect-ratio: 800 / 436;
            min-height: 400px;
        }
        .powerbi-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* RING GRID */
        .rings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .ring-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px; padding: 24px 16px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .ring-wrap {
            position: relative; width: 120px; height: 120px;
        }
        .ring-wrap svg { transform: rotate(-90deg); }
        .ring-bg   { fill: none; stroke: #f0f0f0; stroke-width: 10; }
        .ring-fill {
            fill: none; stroke-width: 10; stroke-linecap: round;
            stroke-dasharray: 345; stroke-dashoffset: 345;
            transition: stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1);
        }
        .ring-label {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ring-pct  { font-size: 26px; font-weight: 900; color: #1a1a1a; line-height: 1; }
        .ring-sub  { font-size: 9px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .ring-name { font-size: 13px; font-weight: 800; color: #444; text-align: center; }
        .ring-detail { font-size: 11px; color: #bbb; font-weight: 600; text-align: center; }

        /* STATS TABLE */
        .stats-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px; padding: 24px 28px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .stats-title {
            font-size: 15px; font-weight: 900; color: #ff4500;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .stats-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .stats-row:last-child { border-bottom: none; }
        .stats-label { font-size: 13px; font-weight: 700; color: #444; min-width: 80px; }
        .stats-bar-wrap { flex: 1; height: 8px; background: #f0f0f0; border-radius: 50px; overflow: hidden; }
        .stats-bar {
            height: 100%; border-radius: 50px;
            width: 0%; transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
        }
        .stats-val { font-size: 13px; font-weight: 900; color: #1a1a1a; min-width: 36px; text-align: right; }

        /* FOOTER NOTE */
        .footer-note {
            background: rgba(255,255,255,0.7);
            border-radius: 14px; padding: 12px 20px;
            font-size: 12px; color: #888; font-weight: 600;
            text-align: center;
        }

        @media (max-width: 600px) {
            .rings-grid { grid-template-columns: repeat(2, 1fr); }
            .navbar-text h1 { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="bubbles">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
    </div>

    <div class="page-wrapper">

        <!-- NAVBAR -->
        <div class="navbar">
            <img src="logo.jpg" alt="SE2026" class="navbar-logo">
            <div class="navbar-text">
                <h1>Dashboard Progress Lapangan</h1>
                <p>BPS Kabupaten Sukoharjo — SE2026</p>
            </div>
            <a href="organik.html" class="btn-back">← Kembali</a>
        </div>

        <div class="content">

            <!-- POWER BI EMBED -->
            <div class="powerbi-card">
                <div class="powerbi-card-header">
                    <span>📈</span>
                    <div style="flex:1">
                        <h2>Monitoring SE2026 BPS Kabupaten Sukoharjo</h2>
                        <p>Data real-time dari Power BI</p>
                    </div>
                    <button onclick="refreshPowerBI()" id="refreshBtn" style="
                        background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.4);
                        border-radius:50px; padding:7px 16px; font-size:12px; font-weight:700;
                        cursor:pointer; flex-shrink:0; transition:background 0.2s;">
                        🔄 Refresh
                    </button>
                </div>
                <div class="powerbi-iframe-wrap">
                    <iframe
                        id="powerbi-iframe"
                        title="Monitoring SE2026 BPS Kabupaten Sukoharjo V4"
                        frameborder="0"
                        allowfullscreen="true">
                    </iframe>
                </div>
            </div>

            <div class="footer-note">
                📌 Data diperbarui secara manual oleh admin &nbsp;|&nbsp; Sensus Ekonomi 2026 — BPS Kabupaten Sukoharjo
            </div>

        </div>
    </div>

    <script>
        const PBI_BASE_URL = "https://app.powerbi.com/view?r=eyJrIjoiNzQ2NWI0YjEtNDZjYS00OTE5LWI0YWYtZDExYjRmOTA5ZjVlIiwidCI6IjA1NmJlZmUzLTNhODktNDM1Ny04NDM4LTc4ZTczMGFjNWVjMyJ9";

        function loadPowerBI() {
            const iframe = document.getElementById('powerbi-iframe');
            iframe.src = PBI_BASE_URL + "&nocache=" + Date.now();
        }

        function refreshPowerBI() {
            const btn = document.getElementById('refreshBtn');
            const oldIframe = document.getElementById('powerbi-iframe');
            const wrap = oldIframe.parentElement;
            btn.textContent = '⏳ Memuat...';
            btn.disabled = true;

            // Fully destroy and recreate the iframe node (not just change its src)
            // so no stale embedded report instance/state survives the refresh.
            const newIframe = document.createElement('iframe');
            newIframe.id = 'powerbi-iframe';
            newIframe.title = 'Monitoring SE2026 BPS Kabupaten Sukoharjo V4';
            newIframe.setAttribute('frameborder', '0');
            newIframe.setAttribute('allowfullscreen', 'true');
            newIframe.onload = () => {
                btn.textContent = '🔄 Refresh';
                btn.disabled = false;
            };
            wrap.replaceChild(newIframe, oldIframe);
            newIframe.src = PBI_BASE_URL + "&nocache=" + Date.now();
        }

        loadPowerBI();
    </script>
</body>
</html>
