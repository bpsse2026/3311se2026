<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Website SE2026 - BPS Kabupaten Sukoharjo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6a00 0%, #fff0e0 50%, #ff8c00 100%);
            background-size: 300% 300%;
            animation: bgShift 8s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING BUBBLES */
        .bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -200px;
            border-radius: 50%;
            background: rgba(255, 200, 50, 0.18);
            animation: floatUp linear infinite;
        }

        .bubble:nth-child(1) { width: 120px; height: 120px; left: 8%;  animation-duration: 9s;  animation-delay: 0s; }
        .bubble:nth-child(2) { width: 70px;  height: 70px;  left: 22%; animation-duration: 7s;  animation-delay: 1.5s; }
        .bubble:nth-child(3) { width: 180px; height: 180px; left: 45%; animation-duration: 11s; animation-delay: 3s; }
        .bubble:nth-child(4) { width: 90px;  height: 90px;  left: 63%; animation-duration: 8s;  animation-delay: 0.8s; }
        .bubble:nth-child(5) { width: 55px;  height: 55px;  left: 78%; animation-duration: 6s;  animation-delay: 2s; }
        .bubble:nth-child(6) { width: 140px; height: 140px; left: 88%; animation-duration: 10s; animation-delay: 4s; }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1);       opacity: 0.6; }
            50%  { transform: translateY(-50vh) scale(1.05); opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1);  opacity: 0; }
        }

        /* PAGE WRAPPER */
        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, #ff8c00 0%, #ff5500 100%);
            padding: clamp(14px, 3vw, 20px) clamp(20px, 5vw, 40px);
            display: flex;
            align-items: center;
            gap: 16px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(255, 80, 0, 0.3);
            margin-bottom: 30px;
        }

        .navbar-logo {
            width: clamp(40px, 8vw, 54px);
            height: clamp(40px, 8vw, 54px);
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .navbar-text h1 {
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 900;
            color: white;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .navbar-text p {
            font-size: clamp(11px, 1.8vw, 13px);
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            margin-top: 2px;
        }

        .navbar-welcome {
            margin-left: auto;
            color: white;
            font-size: clamp(12px, 2vw, 15px);
            font-weight: 700;
            margin-right: 14px;
            white-space: nowrap;
        }

        .btn-logout {
            margin-left: 0;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 50px;
            cursor: pointer;
            flex-shrink: 0;
            transition:
                transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.18s ease,
                border-radius 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.06);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .btn-logout:active {
            transform: scale(0.93);
            border-radius: 50px;
        }

        /* GRID */
        .button-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
            gap: clamp(14px, 3vw, 24px);
        }

        /* DYNAMIC ISLAND BUTTON */
        .nav-button {
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(22px, 4vw, 36px) clamp(16px, 3vw, 24px);
            border-radius: 24px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition:
                transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.18s ease,
                border-radius 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .nav-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 140, 0, 0.06);
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: inherit;
        }

        .nav-button:hover {
            transform: scale(1.06) translateY(-4px);
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(255, 80, 0, 0.3);
        }

        .nav-button:hover::after {
            opacity: 1;
        }

        .nav-button:active {
            transform: scale(0.93);
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(255, 80, 0, 0.2);
        }

        .button-icon {
            font-size: clamp(36px, 6vw, 52px);
            margin-bottom: 12px;
            display: block;
        }

        .button-text {
            color: #ff4500;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .navbar {
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="bubbles">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
    </div>

    <div class="page-wrapper">
        <div class="navbar">
            <img src="logo.jpg" alt="SE2026 Logo" class="navbar-logo">
            <div class="navbar-text">
                <h1>Portal Website SE2026</h1>
                <p>BPS Kabupaten Sukoharjo</p>
            </div>
            <div class="navbar-welcome">Welcome, <span id="welcomeUser"></span>!</div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="button-grid">
            <a href="https://example.com/page1" class="nav-button" target="_blank">
                <div class="button-icon">📄</div>
                <div class="button-text">Page 1</div>
            </a>
            <a href="https://example.com/page2" class="nav-button" target="_blank">
                <div class="button-icon">📊</div>
                <div class="button-text">Page 2</div>
            </a>
            <a href="https://example.com/page3" class="nav-button" target="_blank">
                <div class="button-icon">⚙️</div>
                <div class="button-text">Page 3</div>
            </a>
            <a href="https://example.com/page4" class="nav-button" target="_blank">
                <div class="button-icon">👤</div>
                <div class="button-text">Page 4</div>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = sessionStorage.getItem('currentUser') || 'ORGANIK3311';
            document.getElementById('welcomeUser').textContent = user;
        });

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
